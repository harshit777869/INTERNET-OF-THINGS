<!DOCTYPE html>
<html>
<head>
<title>Home Automation</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:400px;margin:auto;margin-top:50px;background:#1e1e1e;padding:20px;border-radius:10px;}
.card{background:#2d2d2d;margin:10px;padding:10px;border-radius:8px;}
button{padding:10px;margin:5px;}
.on{background:#00ff99;}
.off{background:#ff4444;color:white;}
</style>
</head>
<body>

<div class="box">

<h2>Home Automation</h2>

<div class="card" id="light">💡 Light: OFF</div>
<div class="card" id="fan">🌪 Fan: OFF</div>

<button class="on" onclick="toggle('light')">Toggle Light</button>
<button class="on" onclick="toggle('fan')">Toggle Fan</button>

</div>

<script>
let state = {light:false, fan:false};

function toggle(device){

state[device] = !state[device];

document.getElementById(device).innerHTML =
device + ": " + (state[device] ? "ON" : "OFF");
}
</script>

</body>
</html>
