<!DOCTYPE html>
<html>
<head>
<title>Smart LED Control</title>

<style>
body{font-family:Arial;background:#121212;color:white;text-align:center;}
.box{width:400px;margin:auto;margin-top:50px;background:#1e1e1e;padding:20px;border-radius:10px;}
.led{
width:100px;height:100px;
margin:auto;
border-radius:50%;
background:#333;
box-shadow:0 0 10px #000;
}
button{padding:10px;margin:5px;border:none;}
.on{background:#00ff99;}
.off{background:#ff4444;color:white;}
</style>
</head>
<body>

<div class="box">

<h2>Smart LED Control</h2>

<div id="led" class="led"></div>

<button class="on" onclick="on()">ON</button>
<button class="off" onclick="off()">OFF</button>

</div>

<script>
function on(){
led.style.background="#00ff99";
led.style.boxShadow="0 0 30px #00ff99";
}

function off(){
led.style.background="#333";
led.style.boxShadow="0 0 10px #000";
}
</script>

</body>
</html>
